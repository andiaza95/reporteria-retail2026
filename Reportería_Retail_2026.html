<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reporteria RETAIL.CL | Dashboard 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f17;color:#e2e8f0;min-height:100vh}
.top-bar{background:#1a1a2e;border-bottom:1px solid #2d2d44;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.top-bar h1{font-size:16px;font-weight:700;color:#c084fc;letter-spacing:.5px}
.top-bar .gen{font-size:11px;color:#64748b}
.main{padding:20px 24px;max-width:1400px;margin:0 auto}
.dpbar{background:#1e1e30;border:1px solid #2d2d44;border-radius:10px;padding:16px 18px;margin-bottom:20px}
.dpbar label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.dpbar input[type=date]{background:#0f0f17;border:1px solid #3d3d5c;border-radius:6px;color:#e2e8f0;padding:5px 10px;font-size:13px}
.dpbar input[type=date]:focus{outline:none;border-color:#8b5cf6}
.presets{display:flex;flex-wrap:wrap;gap:5px}
.presets button{background:#2d2d44;border:none;border-radius:5px;color:#94a3b8;padding:4px 10px;font-size:11px;cursor:pointer;transition:all .15s}
.presets button:hover,.presets button.active{background:#8b5cf6;color:#fff}
.dp-row{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end}
.dp-col{display:flex;flex-direction:column;gap:6px}
.dp-sep{width:100%;height:1px;background:#2d2d44;margin:12px 0}
.cmp-block{transition:opacity .2s}
.cmp-block.disabled{opacity:0.4;pointer-events:none}
.section{background:#1a1a2e;border:1px solid #2d2d44;border-radius:12px;padding:20px;margin-bottom:20px}
.section h2{font-size:13px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section h2 span.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:16px}
.kpi-card{background:#0f0f17;border:1px solid #2d2d44;border-radius:10px;padding:16px}
.kpi-card .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-card .period{font-size:12px;color:#8b5cf6;margin-bottom:8px;font-weight:500}
.kpi-card .value{font-size:22px;font-weight:700;color:#e2e8f0}
.kpi-card .sub{margin-top:8px;display:flex;gap:12px;flex-wrap:wrap}
.kpi-card .sub span{font-size:12px;color:#64748b}
.pos{color:#22c55e} .neg{color:#ef4444} .neu{color:#94a3b8}
.ch-table{width:100%;border-collapse:collapse;font-size:13px}
.ch-table th{color:#64748b;font-weight:500;text-align:left;padding:8px 10px;border-bottom:1px solid #2d2d44;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.ch-table td{padding:10px;border-bottom:1px solid #1e1e30;vertical-align:middle}
.ch-table tr:last-child td{border:none}
.ch-name{display:flex;align-items:center;gap:8px;font-weight:600}
.ch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.prog-bar{background:#2d2d44;border-radius:4px;height:6px;margin-top:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .3s}
.b2-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:16px}
.sum-card{background:#0f0f17;border:1px solid #2d2d44;border-radius:8px;padding:14px}
.sum-card .sl{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.sum-card .sv{font-size:18px;font-weight:700;color:#e2e8f0}
.sum-card .sp{font-size:12px;color:#64748b;margin-top:2px}
.b3-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(580px,1fr));gap:16px}
.b3-card{background:#0f0f17;border:1px solid #2d2d44;border-radius:10px;padding:16px}
.b3-card h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.b3-table{width:100%;border-collapse:collapse;font-size:12px}
.b3-table th{color:#64748b;font-weight:500;padding:5px 8px;text-align:right;border-bottom:1px solid #2d2d44;font-size:10px;text-transform:uppercase}
.b3-table th:first-child{text-align:left}
.b3-table td{padding:5px 8px;text-align:right;border-bottom:1px solid #1a1a2e}
.b3-table td:first-child{text-align:left;font-weight:500}
.b3-table tr.total-row td{background:#1e1e30;font-weight:700;color:#e2e8f0;border-top:1px solid #3d3d5c}
.b3-table tr.acum-row td{background:#0a0a14;font-weight:700;color:#c084fc;border-top:1px solid #3d3d5c}
.b3-table tr.cur-month td{background:#1e1830}
.pct-gg{color:#15803d} .pct-g{color:#22c55e} .pct-y{color:#f59e0b} .pct-r{color:#ef4444}
.chart-wrap{max-width:280px;margin:0 auto}
.b2-layout{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start}
.badge-mysql{background:#1e3a1e;border:1px solid #22c55e;color:#22c55e;font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600;letter-spacing:.4px}
/* Tabs */
.tabs{display:flex;gap:0;border-bottom:2px solid #2d2d44;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{background:none;border:none;color:#64748b;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;letter-spacing:.3px;white-space:nowrap;flex-shrink:0}
.tab-btn:hover{color:#c084fc}
.tab-btn.active{color:#c084fc;border-bottom-color:#c084fc}
.tab-content{display:none}
.tab-content.active{display:block}
/* Resumen Ejecutivo */
.re-header{text-align:center;margin-bottom:28px}
.re-header h2{font-size:20px;font-weight:700;color:#e2e8f0;margin-bottom:4px}
.re-header p{font-size:13px;color:#64748b}
.re-total{background:#1a1a2e;border:1px solid #2d2d44;border-radius:14px;padding:24px 28px;margin-bottom:24px}
.re-total .label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.re-total .amount{font-size:36px;font-weight:800;color:#e2e8f0;margin-bottom:4px}
.re-total .meta-txt{font-size:13px;color:#64748b;margin-bottom:14px}
.re-total-bar{background:#2d2d44;border-radius:8px;height:14px;overflow:hidden;margin-bottom:8px}
.re-total-fill{height:100%;border-radius:8px;transition:width .5s}
.re-total-pct{font-size:22px;font-weight:700}
.re-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.re-card{background:#1a1a2e;border:1px solid #2d2d44;border-radius:12px;padding:20px}
.re-card .ch{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;margin-bottom:12px}
.re-card .amount{font-size:26px;font-weight:800;color:#e2e8f0;margin-bottom:2px}
.re-card .meta-txt{font-size:12px;color:#64748b;margin-bottom:12px}
.re-card-bar{background:#2d2d44;border-radius:6px;height:10px;overflow:hidden;margin-bottom:10px}
.re-card-fill{height:100%;border-radius:6px}
.re-pct{font-size:18px;font-weight:700}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
/* ── Tablet ───────────────────────────────────────────── */
@media(max-width:960px){
  .b3-grid{grid-template-columns:1fr}
}
/* ── Mobile ───────────────────────────────────────────── */
@media(max-width:640px){
  .top-bar{padding:10px 14px;flex-direction:column;align-items:flex-start;gap:4px}
  .top-bar h1{font-size:13px}
  .main{padding:10px 12px}
  .section{padding:14px 12px}
  .dpbar{padding:12px}
  .dp-row{flex-direction:column;gap:10px}
  .dp-col{width:100%}
  .dp-col input[type=date]{width:100%;box-sizing:border-box}
  .presets{gap:4px}
  .presets button{font-size:10px;padding:3px 8px}
  .kpi-grid{grid-template-columns:1fr}
  .kpi-card .value{font-size:18px}
  .b2-layout{grid-template-columns:1fr}
  .chart-wrap{max-width:160px;margin:12px auto 0}
  .b2-summary{grid-template-columns:1fr 1fr}
  .b3-grid{grid-template-columns:1fr}
  .b3-table{font-size:11px}
  .b3-table th,.b3-table td{padding:4px 5px}
  .ch-table{font-size:11px}
  .sum-card .sv{font-size:15px}
  .re-header h2{font-size:15px}
  .re-total{padding:14px 16px}
  .re-total .amount{font-size:26px}
  .re-total-pct{font-size:17px}
  .re-card .amount{font-size:21px}
  .re-pct{font-size:15px}
  .re-grid{grid-template-columns:1fr 1fr}
  .re-card{padding:14px 12px}
}
@media(max-width:400px){
  .re-grid{grid-template-columns:1fr}
  .b2-summary{grid-template-columns:1fr}
  .top-bar h1{font-size:12px}
  .re-total .amount{font-size:22px}
}
</style>
</head>

  <button class="tab-btn" onclick="showTab('detalle',this)">Dashboard Completo</button>
</div>

<!-- ══ RESUMEN EJECUTIVO ══════════════════════════════ -->
<div id="tab-resumen" class="tab-content active">

  <div class="re-total">

    <div class="meta-txt" id="re-tot-meta"></div>
    <div class="re-total-bar"><div class="re-total-fill" id="re-tot-fill"></div></div>

  </div>
  <div class="re-grid" id="re-grid"></div>
  <div class="re-total" style="margin-top:16px;border-color:#3d3d5c">

    <div class="re-total-pct" id="re-tot-bruto-pct"></div>
  </div>
</div>

<!-- ══ DASHBOARD COMPLETO ════════════════════════════ -->
<div id="tab-detalle" class="tab-content">

<!-- Date picker -->
<div class="dpbar">

  <div class="dp-row">
    <div class="dp-col">
      <label>Período actual</label>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="date" id="d1"> <span style="color:#64748b">→</span> <input type="date" id="d2">
      </div>
    </div>
    <div class="dp-col">
      <label>Presets</label>
      <div class="presets" id="pPresets">
        <button onclick="sP('month',this)">Este mes</button>
        <button onclick="sP('week',this)">Esta semana</button>
        <button onclick="sP('yesterday',this)">Ayer</button>
        <button onclick="sP('7d',this)">Últ. 7 días</button>
        <button onclick="sP('30d',this)">Últ. 30 días</button>
      </div>
    </div>
    <div class="dp-col" style="margin-left:auto;min-width:0">
      <label>&nbsp;</label>
      <button onclick="render()" style="background:#8b5cf6;border:none;border-radius:6px;color:#fff;padding:8px 18px;font-size:13px;cursor:pointer;font-weight:600;width:100%">Actualizar vista</button>
    </div>
  </div>
  <div class="dp-sep"></div>
  <!-- Fila 2: Comparar con — mismo layout que fila 1 -->
  <div class="dp-row">
    <div class="dp-col cmp-block" id="cmpBlock">
      <label>Comparar con</label>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="date" id="c1"> <span style="color:#64748b">→</span> <input type="date" id="c2">
      </div>
    </div>
    <div class="dp-col">
      <label>Presets comparación</label>
      <div class="presets" id="cPresets">
        <button onclick="sC('none',this)">Sin comparar</button>
        <button onclick="sC('prevmonth',this)">Mes anterior</button>
        <button onclick="sC('prevweek',this)">Semana ant.</button>
        <button onclick="sC('prevyear',this)">Mismo per. año ant.</button>
      </div>
    </div>
  </div>
</div>

<!-- Bloque 1: Shopify -->
<div class="section">
  <h2><span class="dot" style="background:#8b5cf6"></span>Retail.cl — Shopify</h2>
  <div id="b1"></div>
</div>

<!-- Bloque 2: Canales -->
<div class="section">

  return `<span class="${p>=0?'pos':'neg'}">${p>=0?'+':''}${p.toFixed(1)}%</span>`;
}
function pctColor(p){ return p>=100?'pct-gg':p>=85?'pct-g':p>=70?'pct-y':'pct-r'; }
function pctColorHex(p){ return p>=100?'#15803d':p>=85?'#22c55e':p>=70?'#f59e0b':'#ef4444'; }

const today = new Date(); today.setHours(0,0,0,0);
const yesterday = addDays(today,-1);

function sP(type,btn){
  document.querySelectorAll('#pPresets button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  let s,e;
  if(type==='month'){ s=new Date(today.getFullYear(),today.getMonth(),1); e=today; }
  else if(type==='week'){ s=monday(today); e=today; }
  else if(type==='yesterday'){ s=yesterday; e=yesterday; }
  else if(type==='7d'){ s=addDays(today,-6); e=today; }
  else if(type==='30d'){ s=addDays(today,-29); e=today; }
  document.getElementById('d1').value=fmtD(s);
  document.getElementById('d2').value=fmtD(e);
  render();
}

function sC(type,btn){
  document.querySelectorAll('#cPresets button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const block=document.getElementById('cmpBlock');
  if(type==='none'){ cmpActive=false; block.classList.add('disabled'); document.getElementById('c1').value=''; document.getElementById('c2').value=''; render(); return; }
  cmpActive=true; block.classList.remove('disabled');
  const sv=document.getElementById('d1').value, ev=document.getElementById('d2').value;
  if(!sv||!ev) return;
  const sy=+sv.slice(0,4),sm=+sv.slice(5,7)-1,sd=+sv.slice(8,10);
  const ey=+ev.slice(0,4),em=+ev.slice(5,7)-1,ed=+ev.slice(8,10);
  const s=new Date(sy,sm,sd),e=new Date(ey,em,ed);
  let cs,ce;
  if(type==='prevmonth'){ cs=new Date(sy,sm-1,1); ce=new Date(ey,em-1,ed); }
  else if(type==='prevweek'){ cs=addDays(s,-7); ce=addDays(e,-7); }
  else if(type==='prevyear'){ cs=addYears(s,-1); ce=addYears(e,-1); }
  document.getElementById('c1').value=fmtD(cs);
  document.getElementById('c2').value=fmtD(ce);
  render();
}

function renderB1(s,e,cs,ce){
  const cur=fD('Shopify',s,e), cmp=fD('Shopify',cs,ce);
  const wS=fmtD(monday(today)), wE=fmtD(today);
  const wPrevS=fmtD(addDays(monday(today),-7)), wPrevE=fmtD(addDays(monday(today),-1));
  const wCur=fD('Shopify',wS,wE), wPrev=fD('Shopify',wPrevS,wPrevE);
  const yS=fmtD(yesterday), yCur=fD('Shopify',yS,yS);
  const lP=`${s.slice(8,10)}/${s.slice(5,7)} – ${e.slice(8,10)}/${e.slice(5,7)}`;
  const lC=`${cs.slice(8,10)}/${cs.slice(5,7)} – ${ce.slice(8,10)}/${ce.slice(5,7)}`;
  const hasCmp = cmpActive && cs && ce;
  document.getElementById('b1').innerHTML=`
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="label">Período seleccionado</div>
      <div class="period">${lP}${hasCmp?' vs '+lC:''}</div>
      <div class="value">${fmtM(cur.n)} ${hasCmp?fmtPct(cur.n,cmp.n):''}</div>
      <div class="sub">
        <span><b>${cur.o}</b> órdenes${hasCmp?' '+fmtPct(cur.o,cmp.o):''}</span>
      </div>
      <div style="margin-top:8px;font-size:12px;color:#64748b">Neto ${fmtM(cur.n/1.19)} &nbsp;·&nbsp; Ticket ${fmtM(cur.t/1.19)}${hasCmp?' '+fmtPct(cur.t,cmp.t):''}</div>
    </div>
    <div class="kpi-card">
      <div class="label">Semana actual</div>
      <div class="period">${wS.slice(8,10)}/${wS.slice(5,7)} – ${wE.slice(8,10)}/${wE.slice(5,7)}${hasCmp?' vs semana ant.':''}</div>
      <div class="value">${fmtM(wCur.n)} ${hasCmp?fmtPct(wCur.n,wPrev.n):''}</div>
      <div class="sub">
        <span><b>${wCur.o}</b> órdenes${hasCmp?' '+fmtPct(wCur.o,wPrev.o):''}</span>
        ${hasCmp?'<span>Sem. ant: '+fmtM(wPrev.n)+'</span>':''}
      </div>
      <div style="margin-top:8px;font-size:12px;color:#64748b">Neto ${fmtM(wCur.n/1.19)} &nbsp;·&nbsp; Ticket ${fmtM(wCur.t/1.19)}${hasCmp?' '+fmtPct(wCur.t,wPrev.t):''}</div>
    </div>
    <div class="kpi-card">
      <div class="label">Ayer</div>
      <div class="period">${yS.slice(8,10)}/${yS.slice(5,7)}</div>
      <div class="value">${fmtM(yCur.n)}</div>
      <div class="sub">
        <span><b>${yCur.o}</b> órdenes</span>
        <span>Ticket ${fmtM(yCur.t)}</span>
      </div>
      <div style="margin-top:8px;font-size:12px;color:#64748b">Neto ${fmtM(yCur.n/1.19)} &nbsp;·&nbsp; Ticket neto ${fmtM(yCur.t/1.19)}</div>
    </div>
  </div>`;
}

function renderB2(s,e){
  const mesLabel=labelMeses(s,e);
  let rows='', totG=0, totN=0, totO=0;
  const vals={};
  for(const ch of CHANNELS){ const v=fD(ch,s,e); vals[ch]=v; totG+=v.g; totN+=v.g/1.19; totO+=v.o; }
  const metaTot=CHANNELS.reduce((a,c)=>a+metaRango(c,s,e),0);
  for(const ch of CHANNELS){
    const v=vals[ch], meta=metaRango(ch,s,e), pct=meta>0?(v.g/meta*100):0;
    rows+=`<tr>
      <td><div class="ch-name"><div class="ch-dot" style="background:${COLORS[ch]}"></div>${ch}</div></td>
      <td style="text-align:right;font-weight:600">${fmtM(v.g/1.19)}</td>
      <td style="text-align:right">${fmtM(v.g)}</td>
      <td style="text-align:right">${v.o}</td>
      <td style="text-align:right;min-width:110px">
        <span class="${pctColor(pct)}">${pct.toFixed(1)}%</span>
        <div class="prog-bar"><div class="prog-fill" style="width:${Math.min(pct,100)}%;background:${COLORS[ch]}"></div></div>
      </td>
    </tr>`;
  }
  document.getElementById('b2table').innerHTML=`
  <table class="ch-table" style="min-width:440px">
    <thead><tr>
      <th>Canal</th><th style="text-align:right">Neto</th><th style="text-align:right">Bruto</th>
      <th style="text-align:right">Órdenes</th><th style="text-align:right">% Meta ${mesLabel}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
  if(donutChart) donutChart.destroy();
  donutChart=new Chart(document.getElementById('donut'),{
    type:'doughnut',
    data:{labels:CHANNELS,datasets:[{data:CHANNELS.map(c=>Math.round(vals[c].g)),backgroundColor:CHANNELS.map(c=>COLORS[c]),borderWidth:2,borderColor:'#0f0f17'}]},
    options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmtM(ctx.raw)}}},cutout:'65%'}
  });
  const dif=totG-metaTot, pctTot=metaTot>0?(totG/metaTot*100):0;
  document.getElementById('b2summary').innerHTML=`
    <div class="sum-card"><div class="sl">Meta total — ${mesLabel} (bruto)</div><div class="sv">${fmtM(metaTot)}</div><div class="sp">${CHANNELS.map(c=>metaRango(c,s,e).toLocaleString('es-CL')).join(' + ')}</div></div>
    <div class="sum-card"><div class="sl">Total vendido bruto</div><div class="sv">${fmtM(totG)}</div><div class="sp">${pctTot.toFixed(1)}% de la meta mensual</div></div>
    <div class="sum-card"><div class="sl">Diferencia vs meta</div><div class="sv" style="color:${dif>=0?'#22c55e':'#ef4444'}">${dif>=0?'+':''}${fmtM(dif)}</div><div class="sp">${dif>=0?'Sobre la meta':'Faltan'} ${fmtM(Math.abs(dif))}</div></div>
    <div class="sum-card"><div class="sl">Total vendido neto</div><div class="sv">${fmtM(totN)}</div><div class="sp">${totO} órdenes · ticket ${fmtM(totO>0?totN/totO:0)}</div></div>`;
}

function renderB3(){
  const curYear=today.getFullYear(), curMonth=today.getMonth();
  let html='';
  for(const ch of CHANNELS){
    const metas=METAS[ch];
    let totMeta=0,totCom=0,totDif=0,acMeta=0,acCom=0,rows='';
    for(let m=0;m<12;m++){
      const meta=metas[m];
      const mStr=curYear+'-'+String(m+1).padStart(2,'0');
      let gBruto=0;
      for(const [k,v] of Object.entries(DAILY[ch]||{})){ if(k.startsWith(mStr)) gBruto+=v.g; }
      const dif=gBruto-meta, pct=meta>0?(gBruto/meta*100):0;
      totMeta+=meta; totCom+=gBruto; totDif+=dif;
      if(m<=curMonth){ acMeta+=meta; acCom+=gBruto; }
      const isCur=m===curMonth;
      const pctDisp=gBruto>0?`<span class="${pctColor(pct)}">${pct.toFixed(1)}%</span>`:'<span style="color:#3d3d5c">—</span>';
      rows+=`<tr${isCur?' class="cur-month"':''}>
        <td>${MONTHS[m]}</td>
        <td>${fmtM(meta)}</td>
        <td>${gBruto>0?fmtM(gBruto):'<span style="color:#3d3d5c">—</span>'}</td>
        <td>${pctDisp}</td>
        <td style="color:${dif>=0?'#22c55e':'#ef4444'}">${gBruto>0?(dif>=0?'+':'')+fmtM(dif):'—'}</td>
      </tr>`;
    }
    const acDif=acCom-acMeta, acPct=acMeta>0?(acCom/acMeta*100):0;
    html+=`<div class="b3-card">
      <h3><span style="background:${COLORS[ch]};width:10px;height:10px;border-radius:50%;display:inline-block"></span>${ch}</h3>
      <div class="tbl-scroll">
      <table class="b3-table" style="min-width:380px">
        <thead><tr><th style="text-align:left">Mes</th><th>Meta Bruta</th><th>Comercial</th><th>% Cumplido</th><th>Diferencia</th></tr></thead>
        <tbody>
          ${rows}
          <tr class="total-row"><td>TOTAL ANUAL</td><td>${fmtM(totMeta)}</td><td>${fmtM(totCom)}</td><td><span class="${pctColor(totMeta>0?totCom/totMeta*100:0)}">${(totMeta>0?totCom/totMeta*100:0).toFixed(1)}%</span></td><td style="color:${totDif>=0?'#22c55e':'#ef4444'}">${(totDif>=0?'+':'')+fmtM(totDif)}</td></tr>
          <tr class="acum-row"><td>ACUMULADO</td><td>${fmtM(acMeta)}</td><td>${fmtM(acCom)}</td><td><span class="${pctColor(acPct)}">${acPct.toFixed(1)}%</span></td><td style="color:${acDif>=0?'#22c55e':'#ef4444'}">${(acDif>=0?'+':'')+fmtM(acDif)}</td></tr>
        </tbody>
      </table>
      </div>
    </div>`;
  }
  document.getElementById('b3').innerHTML=html;
}

function render(){
  const s=document.getElementById('d1').value, e=document.getElementById('d2').value;
  const cs=document.getElementById('c1').value, ce=document.getElementById('c2').value;
  if(!s||!e) return;
  renderB1(s,e,cs||s,ce||e);
  renderB2(s,e);
  renderB3();
  renderResumen(s,e);
}

(function(){
  const mS=new Date(today.getFullYear(),today.getMonth(),1);
  document.getElementById('d1').value=fmtD(mS);
  document.getElementById('d2').value=fmtD(today);
  document.querySelector('#pPresets button').classList.add('active');
  document.querySelector('#cPresets button').classList.add('active');
  render();
})();

function showTab(name, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function renderResumen(s, e){
  const MESES_L = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const MESES_C = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  const yS=parseInt(s.slice(0,4)), mS=parseInt(s.slice(5,7))-1;
  const yE=parseInt(e.slice(0,4)), mE=parseInt(e.slice(5,7))-1;

  let titulo;
  if(yS===yE && mS===mE) titulo = MESES_L[mS]+' '+yS;
  else if(yS===yE)       titulo = MESES_C[mS]+' / '+MESES_C[mE]+' '+yS;
  else                   titulo = MESES_C[mS]+' '+yS+' / '+MESES_C[mE]+' '+yE;
  document.getElementById('re-titulo').textContent = 'Resumen Ejecutivo — '+titulo;

  const dIni=s.slice(8,10)+'/'+s.slice(5,7), dFin=e.slice(8,10)+'/'+e.slice(5,7);
  document.getElementById('re-fecha').textContent = (s===e?dIni:dIni+' — '+dFin);

  let totNeto=0,totMeta=0,totBruto=0,totMetaBruto=0;
  const canales=[];
  for(const ch of CHANNELS){
    let bruto=0,ordenes=0;
    for(const [k,v] of Object.entries(DAILY[ch]||{})){
      if(k>=s&&k<=e){bruto+=v.g;ordenes+=v.o;}
    }
    const neto=bruto/1.19, metaBruto=metaRango(ch,s,e), metaNeto=metaBruto/1.19;
    const pct=metaNeto>0?(neto/metaNeto*100):0;
    totNeto+=neto; totMeta+=metaNeto; totBruto+=bruto; totMetaBruto+=metaBruto;
    canales.push({ch,neto,metaNeto,bruto,metaBruto,pct,ordenes});
  }

  const totPct=totMeta>0?(totNeto/totMeta*100):0;
  const totColor=pctColorHex(totPct);
  document.getElementById('re-tot-amt').textContent  = fmtM(totNeto)+' neto';
  document.getElementById('re-tot-meta').textContent = 'Meta neta '+titulo+': '+fmtM(totMeta);
  document.getElementById('re-tot-fill').style.cssText='width:'+Math.min(totPct,100)+'%;background:'+totColor;
  const totEl=document.getElementById('re-tot-pct');
  totEl.textContent=(totPct>=100?'✓ ':'')+totPct.toFixed(1)+'% de la meta';
  totEl.style.color=totColor;

  const totBPct=totMetaBruto>0?(totBruto/totMetaBruto*100):0;
  const totBColor=pctColorHex(totBPct);
  document.getElementById('re-tot-bruto-amt').textContent  = fmtM(totBruto)+' bruto';
  document.getElementById('re-tot-bruto-meta').textContent = 'Meta bruta '+titulo+': '+fmtM(totMetaBruto);
  document.getElementById('re-tot-bruto-fill').style.cssText='width:'+Math.min(totBPct,100)+'%;background:'+totBColor;
  const totBEl=document.getElementById('re-tot-bruto-pct');
  totBEl.textContent=(totBPct>=100?'✓ ':'')+totBPct.toFixed(1)+'% de la meta bruta';
  totBEl.style.color=totBColor;

  let html='';
  for(const {ch,neto,metaNeto,pct,ordenes} of canales){
    const color=pctColorHex(pct);
    const pctTxt=pct>=100?'✓ '+pct.toFixed(1)+'%':pct.toFixed(1)+'%';
    html+=`<div class="re-card">
      <div class="ch"><span style="width:10px;height:10px;border-radius:50%;background:${COLORS[ch]};display:inline-block"></span>${ch}</div>
      <div class="amount">${fmtM(neto)}</div>
      <div class="meta-txt">Neto vendido · Meta: ${fmtM(metaNeto)}</div>
      <div class="re-card-bar"><div class="re-card-fill" style="width:${Math.min(pct,100).toFixed(1)}%;background:${color}"></div></div>
      <div class="re-pct" style="color:${color}">${pctTxt}</div>
      <div style="margin-top:8px;font-size:12px;color:#64748b">${ordenes} órdenes</div>
    </div>`;
  }
  document.getElementById('re-grid').innerHTML=html;
}
</script>
